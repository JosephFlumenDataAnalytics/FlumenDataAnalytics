<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://flumendataanalytics.com/">
    <title>Flumen Data Analytics Consulting| Restaurant Analytics in Fort Collins, Loveland, & Greeley CO</title>
    <meta name="description" content="Flumen Data Analytics connects to your point-of-sale system and delivers clear, actionable dashboards monthly. Serving restaurants in Fort Collins, Loveland, Greeley, & Northern Colorado.">
    <meta name="keywords" content="restaurant analytics, Loveland Data Analytics, Greeley Data Analytics, small business data analytics, Fort Collins data analytics, restaurant dashboard, POS data">
    <meta property="og:title" content="Flumen Data Analytics Consulting">
    <meta property="og:description" content="Turn your restaurant's transaction & operational data into actionable insights. One click setup, no contract obligation.">
    <meta property="og:url" content="https://flumendataanalytics.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark:   #1b4332;
            --green-mid:    #2d6a4f;
            --green-accent: #40916c;
            --green-light:  #d8f3dc;
            --green-wash:   #f0f7f2;
            --text-body:    #2c3e35;
            --text-muted:   #6b8c7a;
            --border:       #d4e6dc;
            --white:        #ffffff;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: var(--white);
            color: var(--text-body);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            margin: 0;
        }
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }
        .site-nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--green-dark);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        .nav-info {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-info a {
            color: var(--green-mid);
            text-decoration: none;
        }
        .nav-info a:hover { color: var(--green-dark); }
        .nav-sep { color: var(--border); }
        .site-main { min-height: 100vh; }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="container">
            <a href="/" class="nav-brand">FLUMEN DATA ANALYTICS</a>
            <div class="nav-info">
                <a href="mailto:joseph@flumendataanalytics.com">joseph@flumendataanalytics.com</a>
                <span class="nav-sep">·</span>
                <a href="tel:9706580916">(970) 658-0916</a>
                <span class="nav-sep">·</span>
                <span>Fort Collins, Colorado</span>
            </div>
        </div>
    </nav>
    <main class="site-main">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
